<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plagiarism Checker</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <h1>Plagiarism Checker</h1>
    <p class="subtitle">Compare two documents using the LCS algorithm</p>

    <div class="input-grid">
      <div class="input-block">
        <label for="textA">Document A</label>
        <textarea id="textA" placeholder="Paste Document A here…"></textarea>
      </div>
      <div class="input-block">
        <label for="textB">Document B</label>
        <textarea id="textB" placeholder="Paste Document B here…"></textarea>
      </div>
    </div>

    <button id="checkBtn" onclick="runCheck()">Check Similarity</button>

    <div id="results" class="results hidden">
      <div class="stats">
        <div class="stat-card">
          <span class="stat-label">Similarity Score</span>
          <span class="stat-value" id="score">—</span>
        </div>
        <div class="stat-card">
          <span class="stat-label">LCS Length</span>
          <span class="stat-value" id="lcsLen">—</span>
        </div>
        <div class="stat-card lcs-string-card">
          <span class="stat-label">LCS String</span>
          <span class="stat-value mono" id="lcsStr">—</span>
        </div>
      </div>

      <h2>Diff View</h2>
      <div class="legend">
        <span class="legend-match">matched</span>
        <span class="legend-removed">removed (only in A)</span>
        <span class="legend-added">added (only in B)</span>
      </div>
      <div id="diffView" class="diff-view"></div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
